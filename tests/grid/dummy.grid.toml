# Config file for running a grid of forward models (test)
config_version = "3.0"

output = "dummy_grid"
symlink = ""
ref_config = "tests/grid/base.toml"

use_slurm = false
max_jobs = 2
max_days = 1
max_mem  = 3

# Planet mass [M_earth]
["planet.mass_tot"]
    method = "direct"
    values = [0.7]

# Hydrogen inventory [ppmw] (requires H_mode = "ppmw" in base config)
["planet.elements.H_budget"]
    method = "arange"
    start  = 1000
    stop   = 2000
    step   = 1000

# Core mass fraction
["interior_struct.core_frac"]
    method = "linspace"
    start  = 0.35
    stop   = 0.95
    count  = 2
