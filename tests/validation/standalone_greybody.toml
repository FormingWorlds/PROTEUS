# Standalone grey-body comparison: SPIDER vs Aragog
# No atmosphere model, no UTBL, no radiogenic heating.
# Pure interior physics with sigma*T^4 surface BC.
#
# The ONLY difference between cases is interior.module.
# Everything else is identical.

version = "2.0"

[params]
    [params.out]
        path     = "PLACEHOLDER_PATH"
        plot_mod = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e2
        maximum  = 1e7
        initial  = 1e3
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"

            atol = 0.03
            rtol = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 1.0e5      # 100 kyr

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.solid]
            enabled = true
            phi_crit = 0.01

        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

        [params.stop.escape]
            enabled = false

[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "dummy"
    [star.dummy]
        Teff = 5772.0
        calculate_radius = true

[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"


[planet]
    mass_tot = 1.0
    volatile_mode    = "elements"

[interior_struct]
    core_frac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"

    equilibrate_init     = true
    equilibrate_max_iter = 10
    equilibrate_tol      = 0.02

    update_interval       = 0       # no dynamic structure updates
    update_dtmagma_frac   = 0.99    # effectively disabled
    update_dphi_abs       = 0.99    # effectively disabled
    mesh_max_shift        = 0.05
    mesh_convergence_interval = 10.0

    [interior_struct.zalmoxis]
        core_eos                   = "PALEOS:iron"
        mantle_eos                 = "PALEOS:MgSiO3"
        ice_layer_eos = "none"
        mushy_zone_factor          = 0.8
        mantle_mass_fraction       = 0
        max_iterations_outer       = 80
        tolerance_outer            = 3e-3
        max_iterations_inner       = 80
        tolerance_inner            = 1e-4
        relative_tolerance         = 1e-5
        absolute_tolerance         = 1e-6
        maximum_step               = 200000
        adaptive_radial_fraction   = 0.98
        max_center_pressure_guess  = 1e13
        target_surface_pressure    = 101325
        pressure_tolerance         = 1e9
        max_iterations_pressure    = 200
        verbose                    = false
        iteration_profiles_enabled = false

# Grey-body atmosphere: F_atm = sigma * T_magma^4
# gamma=0 means fully transparent atmosphere: F_OLR = sigma * (T_surf*(1-gamma))^4 = sigma*T_surf^4
# With surf_state="fixed": T_surf = T_magma, so F_atm = sigma * T_magma^4
# The stellar flux adds a small F_ins contribution (~340 W/m^2) which offsets T_eq.
[atmos_clim]
    surf_state      = "fixed"
    surface_d       = 0.01
    surface_k       = 2.0
    albedo_pl       = 0.0
    rayleigh        = false
    cloud_enabled   = false
    tmp_minimum     = 0.5
    tmp_maximum     = 5000.0
    prevent_warming = false
    module          = "dummy"

    [atmos_clim.dummy]
        gamma = 0.0

    [atmos_clim.agni]
        p_top           = 1.0e-5
        spectral_group  = "Dayspring"
        spectral_bands  = "48"
        chemistry       = "none"
        surf_material   = "greybody"
        solve_energy    = true
        solution_atol   = 1e-2
        solution_rtol   = 1e-1
        overlap_method  = "ee"
        rainout         = true
        real_gas        = true
        psurf_thresh    = 1e-3

[escape]
    module = "none"

[interior_energetics]
    module          = "spider"    # PLACEHOLDER: overridden per case
    heat_radiogenic = false       # disable for clean comparison
    heat_tidal      = false
    grain_size      = 0.1
    flux_guess       = -1          # auto: sigma * T_magma^4
    radio_tref = 4.55
    radio_K    = 0.0
    radio_U    = 0.0
    radio_Th   = 0.0
    rfront_loc    = 0.4
    rfront_wid    = 0.15

    [interior_energetics.spider]
        ini_dsdr      = -1.0e-6
        mixing_length = 2
        tolerance_rel = 1e-4
        tsurf_atol    = 50.0
        tsurf_rtol    = 0.05

    [interior_energetics.aragog]
        basal_temperature = 5000.0
        initial_condition = 3
        inner_boundary_condition = 2
        inner_boundary_value = 0
        outer_boundary_condition = 1  # native grey-body: F = sigma*(T^4 - T_eq^4)
        tsurf_poststep_change = 500.0
        param_utbl      = false
        event_triggering = false

[outgas]
    fO2_shift_IW = 0
    module       = "calliope"
    h2_binodal   = false

    [outgas.calliope]
        include_H2O = true
        include_CO2 = true
        include_N2  = true
        include_S2  = true
        include_SO2 = true
        include_H2  = true
        include_CH4 = true
        include_CO  = true
        T_floor     = 800.0

[atmos_chem]
    module = "none"

[observe]
    synthesis = "none"

[accretion]
    module     = "none"

    [planet.elements]
        H_mode          = "ppmw"
        H_budget        = 1.0
        C_mode          = "C/H"
        C_budget        = 0.0
        N_mode          = "N/H"
        N_budget        = 0.0
        S_mode          = "S/H"
        S_budget        = 0.0
