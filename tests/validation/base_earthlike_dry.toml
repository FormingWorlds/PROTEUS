# Earth-like dry test case.
# 1 M_Earth, CMF=0.325, Zalmoxis+PALEOS, AGNI/Honeyside, dry (1 ppmw H).

config_version = "3.0"

[params]
    [params.out]
        path      = "auto"
        plot_mod  = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e2
        maximum  = 1e7
        initial  = 1e3
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"
        atol     = 0.03
        rtol     = 0.15

    [params.stop]
        strict = false
        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 5.0e9
        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000
        [params.stop.solid]
            enabled  = true
            phi_crit = 0.05
        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

[star]
    module = "dummy"
    [star.dummy]
        Teff             = 5772.0
        calculate_radius = true

[orbit]
    semimajoraxis = 1.0

[planet]
    mass_tot         = 1.0
    temperature_mode = "adiabatic"
    tsurf_init       = 4000
    prevent_warming  = true
    volatile_mode    = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 1.0
        C_mode   = "C/H"
        C_budget = 0.0
        N_mode   = "N/H"
        N_budget = 0.0
        S_mode   = "S/H"
        S_budget = 0.0

[interior_struct]
    module    = "zalmoxis"
    core_frac = 0.325
    [interior_struct.zalmoxis]
        core_eos          = "PALEOS:iron"
        mantle_eos        = "PALEOS:MgSiO3"
        mushy_zone_factor = 0.8
        equilibrate_init  = true

[interior_energetics]
    module          = "spider"           # PLACEHOLDER
    heat_radiogenic = true
    flux_guess      = -1
    grain_size      = 0.1
    rfront_loc      = 0.4
    rfront_wid      = 0.15

[outgas]
    module       = "calliope"            # PLACEHOLDER
    fO2_shift_IW = 0

[atmos_clim]
    module         = "agni"
    surf_state     = "skin"
    rayleigh       = true
    p_top          = 1.0e-5
    spectral_group = "Honeyside"
    spectral_bands = "48"
    [atmos_clim.agni]
        solve_energy  = true
        surf_material = "greybody"
        chemistry     = "none"
        solution_atol = 1e-2
        solution_rtol = 1e-1
        rainout       = true
        real_gas      = true
        psurf_thresh  = 1e-3

[escape]
    module = "none"
