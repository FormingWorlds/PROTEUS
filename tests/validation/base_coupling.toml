# Base config for coupling validation matrix.
# Parameters marked PLACEHOLDER are overridden by run_coupling_matrix.py.

# Config file format version
config_version = "3.0"

[params]
    [params.out]
        path      = "auto"
        plot_mod  = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e2
        maximum  = 1e7
        initial  = 1e3
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"
        atol     = 0.03
        rtol     = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 5.0e9

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.solid]
            enabled  = true
            phi_crit = 0.05

        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

# Star: fixed solar (no evolution)
[star]
    module = "dummy"
    [star.dummy]
        Teff             = 5772.0
        calculate_radius = true

# Orbit: 1 AU, no tides
[orbit]
    semimajoraxis = 1.0

# Planet (mass_tot overridden per case)
[planet]
    mass_tot        = 1.0            # PLACEHOLDER
    prevent_warming = true
    volatile_mode   = "elements"

    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 0.0               # PLACEHOLDER
        C_mode   = "C/H"
        C_budget = 0.5
        N_mode   = "N/H"
        N_budget = 0.1
        S_mode   = "S/H"
        S_budget = 0.5

# Interior structure: Zalmoxis + PALEOS
[interior_struct]
    module    = "zalmoxis"
    core_frac = 0.55                 # PLACEHOLDER

    [interior_struct.zalmoxis]
        core_eos          = "PALEOS:iron"
        mantle_eos        = "PALEOS:MgSiO3"
        mushy_zone_factor = 0.8
        equilibrate_init  = true

# Interior energetics (module overridden per case: spider vs aragog)
[interior_energetics]
    module          = "spider"       # PLACEHOLDER
    heat_radiogenic = true
    flux_guess      = -1
    grain_size      = 0.1
    rfront_loc      = 0.4
    rfront_wid      = 0.15

# Outgassing (module overridden per case: calliope vs atmodeller)
[outgas]
    fO2_shift_IW = 0                 # PLACEHOLDER
    module       = "calliope"        # PLACEHOLDER

# Atmosphere: AGNI with SOCRATES RT
[atmos_clim]
    module     = "agni"
    surf_state = "skin"
    rayleigh   = true

    p_top          = 1.0e-5
    spectral_group = "Honeyside"
    spectral_bands = "48"

    [atmos_clim.agni]
        solve_energy  = true
        surf_material = "greybody"
        chemistry     = "none"
        solution_atol = 1e-2
        solution_rtol = 1e-1
        rainout       = true
        real_gas      = true
        psurf_thresh  = 1e-3

# Escape: disabled
[escape]
    module = "none"
