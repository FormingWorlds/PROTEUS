# Base config for coupling validation matrix.
# Parameters marked with PLACEHOLDER are overridden by run_coupling_matrix.py.
# All others are fixed across the matrix.

version = "3.0"

[params]
    [params.out]
        path     = "PLACEHOLDER_PATH"
        plot_mod = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e2
        maximum  = 1e7
        initial  = 1e3
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"

            atol = 0.03
            rtol = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 5.0e9      # 5 Gyr max

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.solid]
            enabled = true
            phi_crit = 0.01      # Crystallization threshold

        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

        [params.stop.escape]
            enabled = false

[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "dummy"
    [star.dummy]
        Teff = 5772.0
        calculate_radius = true

[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"


[planet]
    mass_tot = 1.0           # PLACEHOLDER: overridden per case
    volatile_mode    = "elements"

    prevent_warming = true
[interior_struct]
    core_frac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"

    equilibrate_init     = true
    equilibrate_max_iter = 10
    equilibrate_tol      = 0.02

    update_interval       = 1e5
    update_dtmagma_frac   = 0.03
    update_dphi_abs       = 0.05
    mesh_max_shift        = 0.05
    mesh_convergence_interval = 10.0

    [interior_struct.zalmoxis]
        core_eos                   = "PALEOS:iron"
        mantle_eos                 = "PALEOS:MgSiO3"
        ice_layer_eos = "none"
        mushy_zone_factor          = 0.8
        mantle_mass_fraction       = 0
        max_iterations_outer       = 80
        tolerance_outer            = 3e-3
        max_iterations_inner       = 80
        tolerance_inner            = 1e-4
        relative_tolerance         = 1e-5
        absolute_tolerance         = 1e-6
        maximum_step               = 200000
        adaptive_radial_fraction   = 0.98
        max_center_pressure_guess  = 1e13
        target_surface_pressure    = 101325
        pressure_tolerance         = 1e9
        max_iterations_pressure    = 200
        verbose                    = false
        iteration_profiles_enabled = false

[atmos_clim]
    surf_state      = "skin"
    surface_d       = 0.01
    surface_k       = 2.0
    albedo_pl       = 0.0
    rayleigh        = true
    cloud_enabled   = false
    tmp_minimum     = 0.5
    module          = "agni"

    p_top           = 1.0e-5
    spectral_group  = "Dayspring"
    spectral_bands  = "48"
    overlap_method  = "ee"
    [atmos_clim.agni]
        chemistry       = "none"
        surf_material   = "greybody"
        solve_energy    = true
        solution_atol   = 1e-2
        solution_rtol   = 1e-1
        rainout         = true
        real_gas        = true
        psurf_thresh    = 1e-3

    [atmos_clim.dummy]
        gamma = 0.7

[escape]
    module = "none"

[interior_energetics]
    module          = "spider"   # PLACEHOLDER: overridden per case
    heat_radiogenic = true
    heat_tidal      = false
    grain_size      = 0.1
    flux_guess       = -1   # auto: sigma * T_magma^4
    radio_tref = 4.55
    radio_K    = 310.0
    radio_U    = 0.031
    radio_Th   = 0.124
    rfront_loc    = 0.4
    rfront_wid    = 0.15

    [interior_energetics.spider]
        tolerance_rel = 1e-4

    [interior_energetics.aragog]
        param_utbl      = true

[outgas]
    fO2_shift_IW = 0             # PLACEHOLDER: overridden per case
    module       = "calliope"    # PLACEHOLDER: overridden per case
    h2_binodal   = false

    [outgas.calliope]
        include_H2O = true
        include_CO2 = true
        include_N2  = true
        include_S2  = true
        include_SO2 = true
        include_H2  = true
        include_CH4 = true
        include_CO  = true

    [outgas.atmodeller]
        solver_mode = "robust"
        include_condensates = true

[accretion]
    module     = "none"

    [planet.elements]
        H_mode          = "ppmw"
        H_budget        = 0.0
        C_mode          = "C/H"
        C_budget        = 0.5
        N_mode          = "N/H"
        N_budget        = 0.1
        S_mode          = "S/H"
        S_budget        = 0.5

[observe]
    synthesis = "none"

[atmos_chem]
    module = "none"
