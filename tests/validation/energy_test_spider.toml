# Energy conservation test: SPIDER interior module.
#
# Purpose: Isolate the F_int reporting difference between SPIDER and Aragog.
# SPIDER reports F_int from its own surface-node energy balance (atmosphere.Fatm
# in the JSON output), while Aragog echoes hf_row['F_atm'] from the atmosphere
# module. This test uses the simplest possible coupled setup (transparent
# grey-body surface, zero volatiles, zero CMB flux) to make F_int the only
# diagnostic that differs between the two runs.
#
# Paired with: energy_test_aragog.toml (identical except interior.module).

version = "2.0"

[params]
    [params.out]
        path     = "energy_test_spider"
        plot_mod = 0
        write_mod = 1

    [params.dt]
        minimum  = 10
        maximum  = 1e4
        initial  = 100
        starspec = 1e9
        starinst = 1e9
        method   = "adaptive"

            atol = 0.02
            rtol = 0.10

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 100
            maximum = 1000

        [params.stop.iters]
            enabled = true
            minimum = 3
            maximum = 200

        [params.stop.solid]
            enabled = false

        [params.stop.radeqm]
            enabled = false

        [params.stop.escape]
            enabled = false

# Dummy star: constant solar-like luminosity, no evolution
[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "dummy"
    [star.dummy]
        Teff = 5772.0
        calculate_radius = true

# No orbital evolution
[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"

# Planetary structure via Zalmoxis with PALEOS EOS

[planet]
    planet_mass_tot = 1.0
    initial    = "elements"

[interior_struct]
    core_frac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"

    # Disable structure re-equilibration (not needed without volatiles)
    equilibrate_init     = false
    equilibrate_max_iter = 1
    equilibrate_tol      = 0.02

    # No structure updates during run (fixed mesh)
    update_interval       = 0
    update_dtmagma_frac   = 0.99
    update_dphi_abs       = 0.99

    [interior_struct.zalmoxis]
        core_eos                   = "PALEOS:iron"
        mantle_eos                 = "PALEOS:MgSiO3"
        ice_layer_eos              = ""
        mushy_zone_factor          = 0.8
        coremassfrac               = 0.325
        mantle_mass_fraction       = 0
        temperature_mode           = "adiabatic"
        surface_temperature        = 4000
        center_temperature         = 6000
        max_iterations_outer       = 80
        tolerance_outer            = 3e-3
        max_iterations_inner       = 80
        tolerance_inner            = 1e-4
        relative_tolerance         = 1e-5
        absolute_tolerance         = 1e-6
        maximum_step               = 200000
        adaptive_radial_fraction   = 0.98
        max_center_pressure_guess  = 1e13
        target_surface_pressure    = 101325
        pressure_tolerance         = 1e9
        max_iterations_pressure    = 200
        verbose                    = false
        iteration_profiles_enabled = false

# Transparent grey-body atmosphere: OLR = sigma * T_surf^4
# gamma = 0 means no atmospheric opacity at all.
# surf_state = "fixed" means T_surf = T_magma (no conductive skin).
[atmos_clim]
    surf_state      = "fixed"
    surface_d       = 0.01
    surface_k       = 2.0
    albedo_pl       = 0.0
    rayleigh        = false
    cloud_enabled   = false
    tmp_minimum     = 0.5
    tmp_maximum     = 5000.0
    prevent_warming = true
    module          = "dummy"

    [atmos_clim.dummy]
        gamma = 0.0

# No escape
[escape]
    module = "none"

# SPIDER interior module
[interior_energetics]
    module          = "spider"
    heat_radiogenic = false
    heat_tidal      = false
    grain_size      = 0.1
    flux_guess       = 1e5
    radio_tref = 4.55
    radio_K    = 0.0
    radio_U    = 0.0
    radio_Th   = 0.0
    rfront_loc    = 0.4
    rfront_wid    = 0.15

    [interior_energetics.spider]
        ini_entropy   = 3200.0
        ini_dsdr      = -1.0e-6
        mixing_length = 2
        tolerance_rel = 1e-4
        tsurf_atol    = 50.0
        tsurf_rtol    = 0.05

# Calliope outgassing with minimal volatiles (required module, cannot be "none")
[outgas]
    fO2_shift_IW = 0
    module       = "calliope"
    h2_binodal   = false

[atmos_chem]
    module = "none"

[observe]
    synthesis = "none"

# Zero volatile inventory: ensures desiccation and no atmospheric mass.
[accretion]
    module     = "none"

    [planet.elements]
        H_ppmw   = 1.0
        CH_ratio = 0.0
        NH_ratio = 0.0
        SH_ratio = 0.0
