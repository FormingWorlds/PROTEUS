# Base configuration for Zalmoxis-SPIDER extended validation
#
# Full-physics run: AGNI + SPIDER + MORS + CALLIOPE + ZEPHYRUS
# Runtime target: 1 Myr or until crystallization (phi < 0.005)
# Volatile inventory: 0.1 Earth oceans H (1/10 of default)
#
# The runner script (run_validation_matrix.py) overrides per-case:
#   struct.module, struct.mass_tot, struct.corefrac,
#   struct.zalmoxis.coremassfrac, struct.update_interval,
#   params.out.path

version = "2.0"

# ── Parameters ──────────────────────────────────────────────
[params]
    [params.out]
        path        = "validation/default"
        logging     = "INFO"
        plot_mod    = "none"    # no inline plots; generate comparison plots after
        write_mod   = 1         # write helpfile every iteration
        archive_mod = "none"    # no SOCRATES archives during validation

    [params.dt]
        minimum     = 1e3
        maximum     = 1e6       # cap at 1 Myr steps
        initial     = 30
        starspec    = 1e9
        starinst    = 1e3
        method      = "adaptive"

        [params.dt.adaptive]
            atol = 0.02
            rtol = 0.10

    [params.stop]
        strict = false

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 1.0e6     # 1 Myr

        [params.stop.solid]
            enabled  = true
            phi_crit = 0.005    # stop near full crystallization

        [params.stop.radeqm]
            enabled = false     # don't exit at radiative equilibrium

        [params.stop.escape]
            enabled = false     # don't exit on escape threshold

        [params.stop.disint]
            enabled = false

# ── Star (MORS, solar) ─────────────────────────────────────
[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "mors"

    [star.mors]
        rot_pcntle      = 50.0
        tracks          = "spada"
        age_now         = 4.567
        spectrum_source = "solar"
        star_name       = "sun"

# ── Orbit (1 AU, no tides) ─────────────────────────────────
[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"

# ── Structure ───────────────────────────────────────────────
# Defaults for Zalmoxis mode, Earth-like. Runner overrides per case.
[struct]
    mass_tot     = 1.0
    corefrac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"
    update_interval = 0         # Phase 1 default; Phase 2 runs override to 100 yr

    [struct.zalmoxis]
        core_eos                   = "Seager2007:iron"
        mantle_eos                 = "WolfBower2018:MgSiO3"
        ice_layer_eos              = ""
        coremassfrac               = 0.325
        mantle_mass_fraction       = 0
        weight_iron_frac           = 0.325
        temperature_mode           = "linear"
        surface_temperature        = 3500
        center_temperature         = 6000
        num_levels                 = 150
        max_iterations_outer       = 100
        tolerance_outer            = 3e-3
        max_iterations_inner       = 100
        tolerance_inner            = 1e-4
        relative_tolerance         = 1e-5
        absolute_tolerance         = 1e-6
        maximum_step               = 250000
        adaptive_radial_fraction   = 0.98
        max_center_pressure_guess  = 0.99e12
        target_surface_pressure    = 101325
        pressure_tolerance         = 1e9
        max_iterations_pressure    = 200
        verbose                    = false
        iteration_profiles_enabled = false

# ── Atmosphere (AGNI) ───────────────────────────────────────
[atmos_clim]
    prevent_warming = true
    surface_d       = 0.01
    surface_k       = 2.0
    cloud_enabled   = false
    surf_state      = "fixed"
    surf_greyalbedo = 0.1
    albedo_pl       = 0.0
    rayleigh        = true
    tmp_minimum     = 0.5
    tmp_maximum     = 5000.0
    module          = "agni"

    [atmos_clim.agni]
        verbosity       = 1
        p_top           = 1.0e-5
        p_obs           = 0.02
        spectral_group  = "Honeyside"
        spectral_bands  = "48"
        num_levels      = 40
        chemistry       = "none"
        surf_material   = "greybody"
        solve_energy    = true
        solution_atol   = 0.5
        solution_rtol   = 0.15
        overlap_method  = "ee"
        surf_roughness  = 1e-3
        surf_windspeed  = 2.0
        rainout         = true
        latent_heat     = false
        oceans          = true
        convection      = true
        conduction      = true
        sens_heat       = true
        real_gas        = false
        psurf_thresh    = 0.1
        dx_max_ini      = 300.0
        dx_max          = 35.0
        max_steps       = 70
        perturb_all     = true
        mlt_criterion   = "s"
        ini_profile     = "isothermal"
        ls_default      = 2
        fdo             = 2

# ── Escape (ZEPHYRUS) ──────────────────────────────────────
[escape]
    module    = "zephyrus"
    reservoir = "outgas"

    [escape.zephyrus]
        Pxuv       = 5e-5
        efficiency = 0.1
        tidal      = false

# ── Interior (SPIDER) ──────────────────────────────────────
[interior]
    grain_size      = 0.1
    F_initial       = 1e3
    radiogenic_heat = false
    tidal_heat      = false
    rheo_phi_loc    = 0.6
    rheo_phi_wid    = 0.2
    module          = "spider"

    [interior.spider]
        num_levels               = 60
        mixing_length            = 2
        tolerance                = 1.0e-8
        tolerance_rel            = 1.0e-8
        solver_type              = "bdf"
        tsurf_atol               = 20.0
        tsurf_rtol               = 0.02
        ini_entropy              = 3000.0
        ini_dsdr                 = -4.698e-6
        conduction               = true
        convection               = true
        gravitational_separation = true
        mixing                   = true
        matprop_smooth_width     = 1e-2

# ── Outgassing (CALLIOPE) ──────────────────────────────────
[outgas]
    fO2_shift_IW = 4
    module       = "calliope"

    [outgas.calliope]
        include_H2O = true
        include_CO2 = true
        include_N2  = true
        include_S2  = true
        include_SO2 = true
        include_H2S = true
        include_NH3 = true
        include_H2  = true
        include_CH4 = true
        include_CO  = true
        T_floor     = 700.0
        solubility  = true

# ── Volatile delivery ──────────────────────────────────────
[delivery]
    radio_tref = 4.55
    radio_K    = 310.0
    radio_U    = 0.031
    radio_Th   = 0.124
    initial    = "elements"
    module     = "none"

    [delivery.elements]
        H_oceans = 0.1         # 1/10 of default 1.0
        CH_ratio = 1.0
        NH_ratio = 0.5
        SH_ratio = 2.0

# ── Atmospheric chemistry (disabled) ───────────────────────
[atmos_chem]
    module = "none"

# ── Observations (disabled) ────────────────────────────────
[observe]
    synthesis = "none"
