# Energy conservation test: Aragog interior module.
#
# Purpose: Isolate the F_int reporting difference between SPIDER and Aragog.
# Aragog currently echoes hf_row['F_atm'] as F_int (the atmospheric net flux
# from the previous coupling iteration), whereas SPIDER reports F_int from its
# own surface-node energy balance. This test uses the simplest possible coupled
# setup (transparent grey-body surface, zero volatiles, zero CMB flux) to make
# F_int the only diagnostic that differs between the two runs.
#
# Paired with: energy_test_spider.toml (identical except interior.module).
#
# The ini_tmagma = 1861 K corresponds to SPIDER ini_entropy = 3200 J/K/kg
# at surface pressure, computed from the PALEOS MgSiO3 EOS.

version = "2.0"

[params]
    [params.out]
        path     = "energy_test_aragog"
        logging  = "INFO"
        plot_mod = 0
        write_mod = 1

    [params.dt]
        minimum  = 10
        maximum  = 1e4
        initial  = 100
        starspec = 1e9
        starinst = 1e9
        method   = "adaptive"

        [params.dt.adaptive]
            atol = 0.02
            rtol = 0.10

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 100
            maximum = 1000

        [params.stop.iters]
            enabled = true
            minimum = 3
            maximum = 200

        [params.stop.solid]
            enabled = false

        [params.stop.radeqm]
            enabled = false

        [params.stop.escape]
            enabled = false

# Dummy star: constant solar-like luminosity, no evolution
[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "dummy"
    [star.dummy]
        Teff = 5772.0
        calculate_radius = true

# No orbital evolution
[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"

# Planetary structure via Zalmoxis with PALEOS EOS
[struct]
    mass_tot     = 1.0
    corefrac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"

    # Disable structure re-equilibration (not needed without volatiles)
    equilibrate_init     = false
    equilibrate_max_iter = 1
    equilibrate_tol      = 0.02

    # No structure updates during run (fixed mesh)
    update_interval       = 0
    update_dtmagma_frac   = 0.99
    update_dphi_abs       = 0.99

    [struct.zalmoxis]
        core_eos                   = "PALEOS:iron"
        mantle_eos                 = "PALEOS:MgSiO3"
        ice_layer_eos              = ""
        mushy_zone_factor          = 0.8
        coremassfrac               = 0.325
        mantle_mass_fraction       = 0
        temperature_mode           = "adiabatic"
        surface_temperature        = 4000
        center_temperature         = 6000
        num_levels                 = 120
        max_iterations_outer       = 80
        tolerance_outer            = 3e-3
        max_iterations_inner       = 80
        tolerance_inner            = 1e-4
        relative_tolerance         = 1e-5
        absolute_tolerance         = 1e-6
        maximum_step               = 200000
        adaptive_radial_fraction   = 0.98
        max_center_pressure_guess  = 1e13
        target_surface_pressure    = 101325
        pressure_tolerance         = 1e9
        max_iterations_pressure    = 200
        verbose                    = false
        iteration_profiles_enabled = false

# Transparent grey-body atmosphere: OLR = sigma * T_surf^4
# gamma = 0 means no atmospheric opacity at all.
# surf_state = "fixed" means T_surf = T_magma (no conductive skin).
[atmos_clim]
    surf_state      = "fixed"
    surface_d       = 0.01
    surface_k       = 2.0
    albedo_pl       = 0.0
    rayleigh        = false
    cloud_enabled   = false
    tmp_minimum     = 0.5
    tmp_maximum     = 5000.0
    prevent_warming = true
    module          = "dummy"

    [atmos_clim.dummy]
        gamma = 0.0

# No escape
[escape]
    module = "none"

# Aragog interior module
[interior]
    module          = "aragog"
    radiogenic_heat = false
    tidal_heat      = false
    grain_size      = 0.1
    F_initial       = 1e5
    rheo_phi_loc    = 0.4
    rheo_phi_wid    = 0.15

    [interior.aragog]
        ini_tmagma               = 1861.0
        basal_temperature        = 5000.0
        num_levels               = 80
        tolerance                = 1e-8
        initial_condition        = 3
        inner_boundary_condition = 2
        inner_boundary_value     = 0
        conduction               = true
        convection               = true
        mixing                   = false
        gravitational_separation = false
        tsurf_poststep_change    = 50.0
        param_utbl               = false
        param_utbl_const         = 1e-7
        event_triggering         = true
        mass_coordinates         = true

# Calliope outgassing with minimal volatiles (required module, cannot be "none")
[outgas]
    fO2_shift_IW = 0
    module       = "calliope"
    h2_binodal   = false

[atmos_chem]
    module = "none"

[observe]
    synthesis = "none"

# Minimal volatile inventory (tiny H2O, triggers early desiccation)
[delivery]
    initial    = "elements"
    module     = "none"
    radio_tref = 4.55
    radio_K    = 0.0
    radio_U    = 0.0
    radio_Th   = 0.0

    [delivery.elements]
        H_ppmw   = 1.0
        CH_ratio = 0.0
        NH_ratio = 0.0
        SH_ratio = 0.0
