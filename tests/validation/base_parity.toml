# Base config for SPIDER-Aragog parity validation.
# Runs with PALEOS EOS, matched physics between both solvers.
# The interior_energetics.module field is overridden per case.
#
# Matching choices:
# - PALEOS:MgSiO3 EOS for both (via Zalmoxis structure)
# - Entropy-conserving IC from PALEOS entropy tables
# - prevent_warming = true (monotonic cooling)
# - Dummy star + no escape (isolate interior-atmosphere coupling)

# Config file format version
config_version = "3.0"

[params]
    [params.out]
        path      = "auto"
        plot_mod  = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e2
        maximum  = 1e7
        initial  = 1e3
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"
        atol     = 0.03
        rtol     = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 5.0e9

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.solid]
            enabled  = true
            phi_crit = 0.01

        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

# Star: fixed solar (no evolution)
[star]
    module = "dummy"
    [star.dummy]
        Teff             = 5772.0
        calculate_radius = true

# Orbit: 1 AU, no tides
[orbit]
    semimajoraxis = 1.0

# Planet
[planet]
    mass_tot        = 1.0
    prevent_warming = true
    volatile_mode   = "elements"

    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 500.0
        C_mode   = "C/H"
        C_budget = 0.5

# Interior structure: Zalmoxis + PALEOS
[interior_struct]
    module       = "zalmoxis"
    core_frac    = 0.55

    [interior_struct.zalmoxis]
        core_eos          = "PALEOS:iron"
        mantle_eos        = "PALEOS:MgSiO3"
        mushy_zone_factor = 0.8
        equilibrate_init  = true

# Interior energetics (overridden per case: spider vs aragog)
[interior_energetics]
    module          = "spider"
    heat_radiogenic = true
    flux_guess      = -1             # auto: sigma * T_magma^4
    grain_size      = 0.1
    rfront_loc      = 0.4
    rfront_wid      = 0.15

# Outgassing
[outgas]
    fO2_shift_IW = 0
    module       = "calliope"

# Atmosphere: AGNI with SOCRATES RT
[atmos_clim]
    module     = "agni"
    surf_state = "skin"
    rayleigh   = true

    p_top          = 1.0e-5
    spectral_group = "Dayspring"
    spectral_bands = "48"

    [atmos_clim.agni]
        solve_energy  = true
        surf_material = "greybody"
        chemistry     = "none"
        solution_atol = 1e-2
        solution_rtol = 1e-1
        rainout       = true
        real_gas      = true
        psurf_thresh  = 1e-3

# Escape: disabled
[escape]
    module = "none"
