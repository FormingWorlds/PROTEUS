# Isolated SPIDER vs Aragog parity test.
# Everything dummy except interior energetics (spider or aragog).
# WolfBower2018 EOS (< 1 TPa), 1 M_Earth, Earth-like CMF.
# Minimal atmosphere (0.1 Earth Oceans H).
# Variation: tsurf_init (2500, 3500 K) and interior module.

config_version = "3.0"

[params]
    [params.out]
        path      = "auto"
        plot_mod  = 0
        write_mod = 1

    [params.dt]
        minimum  = 1.0                       # Allow tiny retries for stiff blackbody BCs
        maximum  = 1e7
        initial  = 10.0                      # Gentle warm-up; adaptive speed-up handles growth
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"
        atol     = 0.03
        rtol     = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 5.0e9

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 5000

        [params.stop.solid]
            enabled  = true
            phi_crit = 0.05

        [params.stop.radeqm]
            enabled = true
            atol    = 0.2
            rtol    = 1e-3

# Star: dummy (fixed solar)
[star]
    module = "dummy"
    [star.dummy]
        Teff             = 5772.0
        calculate_radius = true

# Orbit: 1 AU, no tides
[orbit]
    semimajoraxis = 1.0

# Planet: 1 M_Earth, adiabatic IC
[planet]
    mass_tot         = 1.0
    temperature_mode = "adiabatic"
    tsurf_init       = 3500              # PLACEHOLDER: 2500 or 3500
    prevent_warming  = true
    volatile_mode    = "elements"

    [planet.elements]
        H_mode   = "oceans"
        H_budget = 0.1                   # 0.1 Earth Oceans
        C_mode   = "C/H"
        C_budget = 0.0
        N_mode   = "N/H"
        N_budget = 0.0
        S_mode   = "S/H"
        S_budget = 0.0

# Interior structure: DUMMY (no Zalmoxis, fixed Earth-like structure)
[interior_struct]
    module        = "dummy"
    core_frac     = 0.325
    core_density  = 10738
    core_heatcap  = 880
    melting_dir   = "Wolf_Bower+2018"
    eos_dir       = "1TPa-dK09-elec-free"

# Interior energetics: PLACEHOLDER (spider or aragog)
[interior_energetics]
    module          = "spider"           # PLACEHOLDER
    num_levels      = 80
    heat_radiogenic = true
    flux_guess      = -1
    grain_size      = 0.1
    rfront_loc      = 0.4
    rfront_wid      = 0.15

# Outgassing: dummy
[outgas]
    module       = "dummy"

# Atmosphere: dummy, pure blackbody BC (Option C for parity cases).
# surf_state="fixed" pins T_surf=T_magma (no conductive lid drop).
# dummy.gamma=0 makes the atmosphere transparent, so F_atm = sigma*T_magma^4.
# This makes the atmospheric BC self-consistent with SPIDER's isentropic
# initial condition (removes the stiff CBL transient that crashes CVode).
[atmos_clim]
    module     = "dummy"
    rayleigh   = false
    surf_state = "fixed"

    [atmos_clim.dummy]
        gamma = 0.0

# Escape: disabled
[escape]
    module = "none"
