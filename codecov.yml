coverage:
  # Badge colour gradient: red at 70%, bright green at 90%.
  # Matches the PROTEUS ecosystem 90% coverage ceiling.
  range: "70...90"
  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: 80%
flags:
  unit-tests:
    paths:
      - src/
    carryforward: true
  nightly:
    paths:
      - src/
    carryforward: true
