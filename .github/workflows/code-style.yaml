name: Code style

on:
  push:
    branches:
      - main
      - 'tl/**'  # Tim's long-running feature branches (often draft PRs;
                # draft PRs do not fire pull_request:synchronize by
                # default, so an explicit push trigger keeps CI live).
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

# Deduplicate runs along two axes: same commit two events (push +
# pull_request:synchronize on the same SHA) and older-commit
# superseded by a newer push to the same branch. Keying on the branch
# name (head_ref for PR events, ref_name for push events) groups all
# events on the same branch under one concurrency cell.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  codestyle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45

    - name: Run Pre-Commit
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      uses: pre-commit/action@v3.0.1
      with:
        extra_args: --files $ALL_CHANGED_FILES
