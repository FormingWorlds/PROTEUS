name: Code style

on:
  push:
    branches:
      - main
      - 'tl/**'  # Tim's long-running feature branches (often draft PRs;
                # draft PRs do not fire pull_request:synchronize by
                # default, so an explicit push trigger keeps CI live).
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

# Deduplicate runs when a single commit fires both push (via the
# tl/** filter) and pull_request:synchronize (the moment the PR comes
# out of draft). The commit SHA is the same in both events; keying
# concurrency on it cancels the older run when the newer one fires.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  codestyle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45

    - name: Run Pre-Commit
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      uses: pre-commit/action@v3.0.1
      with:
        extra_args: --files $ALL_CHANGED_FILES
