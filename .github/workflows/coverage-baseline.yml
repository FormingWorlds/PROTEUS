name: Main coverage baseline

# Refresh the unit-test coverage report Codecov uses as the comparison base for
# pull requests. The pull-request workflow uploads coverage only on
# pull_request events, so pushes to main never refresh the base; without this
# job Codecov compares each PR against an increasingly stale main report, which
# distorts the patch and project coverage shown on the PR. Running the unit
# suite with coverage on every push to main keeps the base current. The upload
# runs even when a unit test fails on main, so the base keeps advancing; a
# broken test instead surfaces as a red status on the final step, after the
# baseline has been published.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-baseline-${{ github.ref }}
  # Run every push to completion so the base advances with main HEAD. Cancelling
  # a baseline producer would leave Codecov's base on an older commit, the
  # staleness this workflow exists to prevent.
  cancel-in-progress: false

defaults:
  run:
    shell: bash -el {0}

jobs:
  unit-coverage:
    name: Upload unit coverage for main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PROTEUS environment
        uses: ./.github/actions/setup-proteus
        with:
          full-data: 'false'

      - name: Run unit tests with coverage
        id: run-unit
        # Do not abort the job on a failing test: the upload below must still run
        # so the base advances. A genuine test failure is surfaced by the final
        # step instead.
        continue-on-error: true
        run: |
          set -euo pipefail
          # Same selection and flags as the pull-request unit job, so the
          # baseline matches what pull requests are compared against. fail-under
          # is 0 because this job publishes a baseline, it does not gate.
          pytest -m "unit and not skip and not slow and not integration" \
            --ignore=tests/examples \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=0 \
            -p no:faulthandler

      - name: Upload coverage to Codecov
        # always(): publish the baseline even when a unit test failed above.
        # The token guard makes a missing/rotated token a visible skip rather
        # than a silent green no-op.
        if: always() && env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: unit-tests
          name: main-baseline-coverage
          # Upload only the file named above. Without this, codecov-action
          # searches the workspace and uploads any other coverage reports it
          # finds under this flag, which would corrupt the baseline.
          disable_search: true
          # A transient upload failure must not turn this job red: the coverage
          # is already generated and this job does not gate.
          fail_ci_if_error: false

      - name: Surface unit-test failures
        # The base is already published above; now reflect main's test health.
        if: steps.run-unit.outcome == 'failure'
        run: |
          echo "Unit tests failed on main; coverage was still uploaded." >&2
          exit 1
