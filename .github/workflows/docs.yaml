name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v6
        with:
          # setuptools-scm derives the version from git tags, so the full tag
          # history must be present for the editable install.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e '.[develop,docs]'
      - name: Cache documentation badges as static SVGs
        run: python tools/cache_badges.py --out docs/badges/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
