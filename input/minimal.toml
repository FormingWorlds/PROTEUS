# Minimal PROTEUS configuration.
# Only science-critical parameters are set here; everything else uses defaults.
# All section headers must be present (required by cattrs), but can be empty.
# See all_options.toml for the full set of options.
version = "3.0"

[params]
    [params.out]

[star]
    [star.mors]
        rot_pcntle      = 50.0
        age_now         = 4.567
        spectrum_source = "solar"
        star_name       = "sun"

[orbit]
    semimajoraxis = 1.0              # [AU]

[planet]
    mass_tot      = 1.0              # [M_earth]
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 5.0               # [Earth oceans]

[interior_struct]
[interior_energetics]

[outgas]
    fO2_shift_IW = 4                 # [log10 delta IW]

[atmos_clim]
    spectral_group = "Honeyside"
    spectral_bands = "48"

[escape]
[accretion]
[observe]
[atmos_chem]
