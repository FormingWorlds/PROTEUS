# Minimal PROTEUS configuration file.
# All sections must be present; omitted fields use Python defaults.
# See all_options.toml for the full set of options.
version = "3.0"

[params]
    [params.out]
        path = "auto"

[star]
    module = "mors"
    [star.mors]
        rot_pcntle      = 50.0
        age_now         = 4.567
        spectrum_source = "solar"
        star_name       = "sun"

[orbit]
    module = "none"

[planet]
    mass_tot      = 1.0
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 5.0

[interior_struct]
    core_frac = 0.55

[interior_energetics]
    module = "spider"

[outgas]
    module = "calliope"

[atmos_clim]
    module         = "agni"
    spectral_group = "Honeyside"
    spectral_bands = "48"

[escape]
    module = "zephyrus"

[accretion]
    module = "none"

[observe]
    synthesis = "none"

[atmos_chem]
    module = "none"
