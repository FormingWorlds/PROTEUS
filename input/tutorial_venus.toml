# PROTEUS Tutorial: CHILI Nominal Venus
#
# Reproduces the nominal Venus case from the CHILI intercomparison
# (Lichtenberg et al. 2026, PSJ 7:108, Table 2).
#
# Identical to Nominal Earth except: mass=0.815, radius=0.95, orbit=0.723 AU.
#
# Run: proteus start --offline -c input/tutorial_venus.toml

config_version = "3.0"

[params.out]
    path    = "tutorial_venus"
    logging = "INFO"

[params.dt]
    method  = "adaptive"
    initial = 10.0
    minimum = 100.0
    maximum = 1e7
    atol    = 0.04
    rtol    = 0.11
    mushy_maximum = 4e3
    mushy_upper   = 0.99

    [params.stop.time]
        maximum = 5e9
    [params.stop.solid]
        phi_crit = 0.05

[star]
    module  = "mors"
    mass    = 1.0
    age_ini = 0.05
    [star.mors]
        tracks          = "spada"
        age_now         = 4.567
        rot_pcntle      = 50.0
        star_name       = "sun"
        spectrum_source = "solar"

[orbit]
    module        = "none"
    semimajoraxis = 0.723
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375

[planet]
    mass_tot         = 0.815
    prevent_warming  = true
    temperature_mode = "isentropic"
    ini_entropy      = 3900.0
    ini_dsdr         = -4.698e-6
    volatile_mode    = "elements"
    [planet.elements]
        O_mode   = "ic_chemistry"
        O_budget = 0.0
        H_mode   = "kg"
        H_budget = 4.7e20
        C_mode   = "kg"
        C_budget = 2.73e20
        N_mode   = "kg"
        N_budget = 0.0
        S_mode   = "kg"
        S_budget = 0.0

[interior_struct]
    module         = "zalmoxis"
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

[interior_energetics]
    module           = "aragog"
    num_levels       = 80
    rtol             = 1e-8
    flux_guess       = 1000.0
    trans_conduction = true
    trans_convection = true
    trans_grav_sep   = true
    trans_mixing     = true
    heat_radiogenic  = true
    radio_tref       = 4.55
    radio_K          = 310.0
    radio_U          = 0.031
    radio_Th         = 0.124
    grain_size       = 0.1
    mixing_length    = "constant"

[outgas]
    module       = "calliope"
    fO2_shift_IW = 4.0
    [outgas.calliope]
        include_H2O = true
        include_CO2 = true
        include_H2  = true
        include_CH4 = true
        include_CO  = true
        solubility  = true

[atmos_clim]
    module     = "agni"
    surf_state = "skin"
    surface_d  = 0.01
    surface_k  = 2.0
    rayleigh   = false
    albedo_pl  = 0.1
    spectral_group = "Dayspring"
    spectral_bands = "48"
    num_levels     = 45
    p_top          = 1e-4
    [atmos_clim.agni]
        chemistry    = "none"
        solve_energy = true
        real_gas     = true
        dx_max       = 15.0
        max_steps    = 70
        perturb_all  = true

[escape]
    module = "zephyrus"
    [escape.zephyrus]
        efficiency = 0.3
