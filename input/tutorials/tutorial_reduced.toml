config_version = "3.0"

[params.out]
    path = "tutorial_reduced"

[params.dt]
    initial = 1e2
    minimum = 1e3
    maximum = 1e7

    [params.stop.time]
        maximum = 5e9

[star]
    module  = "mors"
    mass    = 1.0
    age_ini = 0.1

[orbit]
    semimajoraxis = 1.0

[planet]
    mass_tot         = 1.0
    temperature_mode = "liquidus_super"
    delta_T_super    = 500.0
    volatile_mode    = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 2.0
        C_mode   = "C/H"
        C_budget = 1.0
        N_mode   = "N/H"
        N_budget = 0.5
        S_mode   = "S/H"
        S_budget = 1.0

[interior_struct]
    module    = "zalmoxis"
    core_frac = 0.325

[interior_energetics]
    module = "aragog"

[outgas]
    module       = "calliope"
    fO2_shift_IW = -2

[atmos_clim]
    module = "agni"

[escape]
    module = "zephyrus"
