# Integration test: Full PALEOS coupling stack
# Zalmoxis structure (PALEOS EOS) + SPIDER interior + AGNI atmosphere
# + CALLIOPE outgassing + ZEPHYRUS escape
# Tests the complete PROTEUS-Zalmoxis-SPIDER coupling with PALEOS unified EOS,
# mushy_zone_factor, VolatileProfile phi-blending, and composition feedback.
# Designed to run locally at 1-5 M_Earth for quick verification.

version = "2.0"

[params]
    [params.out]
        path     = "test_paleos_2ME"
        plot_mod = 0
        write_mod = 1

    [params.dt]
        minimum  = 1e1
        maximum  = 1e6
        initial  = 1e1
        starspec = 1e9
        starinst = 1e2
        method   = "adaptive"

            atol = 0.03
            rtol = 0.15

    [params.stop]
        strict = false

        [params.stop.time]
            enabled = true
            minimum = 1.0e3
            maximum = 1.0e5     # 100 kyr for quick test

        [params.stop.iters]
            enabled = true
            minimum = 5
            maximum = 50

        [params.stop.solid]
            enabled = false

        [params.stop.radeqm]
            enabled = false

        [params.stop.escape]
            enabled = false

[star]
    mass    = 1.0
    age_ini = 0.100
    module  = "dummy"
    [star.dummy]
        Teff = 5772.0
        calculate_radius = true

[orbit]
    semimajoraxis = 1.0
    eccentricity  = 0.0
    zenith_angle  = 48.19
    s0_factor     = 0.375
    module        = "none"


[planet]
    mass_tot = 2.0          # M_Earth (override for mass sweep)
    volatile_mode    = "elements"

    prevent_warming = true
[interior_struct]
    core_frac     = 0.55
    core_density = 10738.33
    core_heatcap = 880.0
    module       = "zalmoxis"

    # Equilibrate CALLIOPE + Zalmoxis before SPIDER starts
    equilibrate_init     = true
    equilibrate_max_iter = 10
    equilibrate_tol      = 0.02

    # Dynamic structure updates during main loop
    update_interval       = 1e5    # yr ceiling
    update_dtmagma_frac   = 0.03
    update_dphi_abs       = 0.05
    mesh_max_shift        = 0.05
    mesh_convergence_interval = 10.0

    [interior_struct.zalmoxis]
        core_eos                   = "PALEOS:iron"
        mantle_eos                 = "PALEOS:MgSiO3"
        ice_layer_eos = "none"
        mushy_zone_factor          = 0.8
        mantle_mass_fraction       = 0

[atmos_clim]
    surf_state      = "skin"
    surface_d       = 0.01
    surface_k       = 2.0
    albedo_pl       = 0.0
    rayleigh        = true
    cloud_enabled   = false
    tmp_minimum     = 0.5
    module          = "agni"

    [atmos_clim.agni]
        p_top           = 1.0e-5
        spectral_group  = "Dayspring"
        spectral_bands  = "48"
        chemistry       = "none"
        surf_material   = "greybody"
        solve_energy    = true
        solution_atol   = 1e-2
        solution_rtol   = 1e-1
        overlap_method  = "ee"
        rainout         = true
        real_gas        = true
        psurf_thresh    = 1e-3

    [atmos_clim.dummy]
        gamma = 0.7

[escape]
    module = "none"

[interior_energetics]
    module          = "spider"
    heat_radiogenic = false
    heat_tidal      = false
    grain_size      = 0.1
    flux_guess       = 1e5
    radio_tref = 4.55
    radio_K    = 310.0
    radio_U    = 0.031
    radio_Th   = 0.124
    rfront_loc    = 0.4
    rfront_wid    = 0.15

    [interior_energetics.spider]
        tolerance_rel = 1e-4

[outgas]
    fO2_shift_IW = 0
    module       = "calliope"
    h2_binodal   = false

    [outgas.calliope]
        include_H2O = true
        include_CO2 = true
        include_N2  = true
        include_S2  = true
        include_SO2 = true
        include_H2  = true
        include_CH4 = true
        include_CO  = true
        T_floor     = 800.0

[accretion]
    module     = "none"

    [planet.elements]
        H_mode          = "ppmw"
        H_budget        = 500.0
        C_mode          = "C/H"
        C_budget        = 0.5
        N_mode          = "N/H"
        N_budget        = 0.1
        S_mode          = "S/H"
        S_budget        = 0.0

[observe]
    synthesis = "none"

[atmos_chem]
    module = "none"
