# PROTEUS configuration file (version 2.0)

version = "2.0"

[params]
    [params.out]
        path        = "earth"
        plot_mod    = 10
        write_mod   = 2

    [params.dt]
        starspec     = 1e8
        starinst     = 1e2
        minimum      = 1e5
        initial      = 1e5

            atol         = 0.03
            rtol         = 0.12

    [params.stop]

        [params.stop.time]
            enabled = true
            maximum = 4.44e+9 # 4.54 Gyr minus age_ini

        [params.stop.solid]
            enabled  = false
            phi_crit = 0.005

        [params.stop.radeqm]
            enabled = false
            atol    = 0.1
            rtol    = 1e-3

        [params.stop.escape]
            enabled   = true
            p_stop    = 0.2

[star]
    mass    = 1.0
    age_ini = 0.100

    module  = "mors"
    [star.mors]
        rot_pcntle = 50.0
        age_now = 4.57 # Gyr
        star_name = "sun"
        spectrum_source = "solar"

[orbit]
    semimajoraxis   = 1.0
    eccentricity    = 0.0167
    zenith_angle    = 48.19
    s0_factor       = 0.375
    module  = "none"

[planet]
    mass_tot = 1.0

[interior_struct]
    core_frac    = 0.55

[atmos_clim]
    surf_state      = "skin"
    rayleigh        = true
    module          = "agni"
    albedo_pl       = 0.0      # test guess, contribution from clouds

    p_top          = 1e-4
    spectral_group = "Dayspring"
    spectral_bands = "48"
    [atmos_clim.agni]
        dx_max         = 100.0
        sens_heat      = false
        cloud_enabled  = false
        rainout        = false
        oceans         = true
        solution_atol  = 2.0
        ls_default     = 2

[escape]
    module = "zephyrus"

    [escape.zephyrus]
        Pxuv        = 1e-4          # Pressure at which XUV radiation become opaque in the planetary atmosphere [bar]
        efficiency  = 0.15           # Escape efficiency factor
        tidal       = true         # Tidal contribution enabled

[interior_energetics]
    heat_radiogenic = false
    heat_tidal      = false

    module = "dummy"

    [interior_energetics.dummy]
        heat_internal    = 8e-12
        mantle_cp  = 2000.0

    [interior_energetics.spider]

[outgas]
    fO2_shift_IW    = 4

    module = "calliope"

[accretion]

    module = "none"

    [planet.elements]
        H_mode          = "oceans"
        H_budget        = 2.0
        C_mode          = "C/H"
        C_budget        = 1.0
        N_mode          = "N/H"
        N_budget        = 0.018
        S_mode          = "S/H"
        S_budget        = 2.16





[observe]
    synthesis = "none"

[atmos_chem]
    module = "none"
