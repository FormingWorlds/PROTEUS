# Escape demo: XUV-driven atmospheric escape with MORS stellar evolution.
version = "3.0"

[params]
    [params.out]
        path     = "auto"
        plot_fmt = "pdf"

    [params.dt]
        minimum  = 3e2
        maximum  = 8e7
        initial  = 1e4
        starinst = 100
        method   = "maximum"

    [params.stop]
        [params.stop.time]
            minimum = 8e8
            maximum = 2e9
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false
        [params.stop.escape]
            enabled = true
            p_stop  = 1.0

# Star: solar evolution with MORS
[star]
    module = "mors"
    [star.mors]
        rot_pcntle      = 50.0
        age_now         = 4.567
        spectrum_source = "solar"
        star_name       = "sun"

# Orbit: 0.5 AU, no tides
[orbit]
    semimajoraxis = 0.5

# Planet: volatile-rich
[planet]
    mass_tot        = 1.0
    prevent_warming = true
    volatile_mode   = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 30.0
        N_budget = 3.0

# Interior structure
[interior_struct]
    core_frac = 0.55

# Interior energetics: parameterized
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false

# Outgassing: oxidizing conditions
[outgas]
    fO2_shift_IW = 5
    module       = "calliope"

# Atmosphere: AGNI with real-gas EOS
[atmos_clim]
    module     = "agni"
    surf_state = "fixed"
    rayleigh   = false

    spectral_group = "Dayspring"
    spectral_bands = "16"
    p_top          = 1e-5

    [atmos_clim.agni]
        solve_energy  = false
        surf_material = "surface_albedos/Hammond24/lunarmarebasalt.dat"
        real_gas      = true
        solution_atol = 2.0
        solution_rtol = 0.13
        rainout       = false

# Escape: energy-limited (dummy module, fixed rate for demo)
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1e6

[accretion]
[observe]
[atmos_chem]
