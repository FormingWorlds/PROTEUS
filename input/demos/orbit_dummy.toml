# Orbit demo (dummy tides): close-in planet with parameterized tidal heating.
# Tests orbital evolution + disintegration checks with dummy modules.
version = "3.0"

    [params.out]
        path      = "auto"
        write_mod = 400

    [params.dt]
        minimum = 1e3
        maximum = 1e7
        initial = 1e3

        [params.stop.time]
            maximum = 1e7
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false
        [params.stop.escape]
            p_stop = 1.0
        [params.stop.disint]
            enabled      = true
            roche_enabled = true
            offset_roche  = 1.8e9       # [m]

# Star: fixed solar
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0

# Orbit: very close (0.02 AU), high eccentricity, evolving
[orbit]
    module        = "dummy"
    semimajoraxis = 0.02             # [AU]
    eccentricity  = 0.5
    evolve        = true
    [orbit.dummy]
        H_tide = 1e-9
        Imk2   = -0.01

# Planet
[planet]
    mass_tot = 1.0
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 200.0
        N_budget = 0.0

# Interior structure
[interior_struct]
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

# Interior energetics: parameterized
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_NH3 = false

# Atmosphere: grey opacity model
[atmos_clim]
    module     = "dummy"
    surf_state = "fixed"
    rayleigh   = false
    albedo_pl  = 0.1
    [atmos_clim.dummy]
        gamma = 0.7

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1.0e5
