# Orbit demo (physical tides): close-in planet with LovePy viscoelastic tidal heating.
# Tests orbit evolution + SPIDER interior + tidal dissipation coupling.
version = "3.0"

    [params.out]
        path      = "auto"
        write_mod = 10
        plot_mod  = 10

    [params.dt]
        minimum = 1e3
        maximum = 3e7
        initial = 1e3

        [params.stop.time]
            maximum = 1e9
        [params.stop.solid]
            enabled = true
        [params.stop.radeqm]
            enabled = true
        [params.stop.escape]
            p_stop = 1.0
        [params.stop.disint]
            enabled       = true
            roche_enabled = true

# Star: fixed solar
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0

# Orbit: very close (0.03 AU), high eccentricity, evolving with LovePy
[orbit]
    module        = "lovepy"
    semimajoraxis = 0.03             # [AU]
    eccentricity  = 0.8
    axial_period  = 6                # [hours]
    evolve        = true

# Planet
[planet]
    mass_tot = 1.0
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 3.0

# Interior structure
[interior_struct]
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

# Interior energetics: SPIDER with tidal heating
[interior_energetics]
    module          = "spider"
    heat_radiogenic = false
    heat_tidal      = true
    flux_guess      = 1e3
    rfront_loc      = 0.3
    rfront_wid      = 0.15

# Outgassing
[outgas]
    fO2_shift_IW = 0
    module       = "calliope"

# Atmosphere: AGNI radiative transfer
[atmos_clim]
    module     = "agni"
    surf_state = "fixed"
    rayleigh   = false

    spectral_group = "Honeyside"
    spectral_bands = "48"
    p_top          = 1.0e-5

    [atmos_clim.agni]
        solve_energy  = false
        solution_atol = 1e-3
        solution_rtol = 2e-2
        rainout       = false

# Escape: none
[escape]
    module = "none"
