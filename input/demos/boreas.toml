# BOREAS escape demo: fractionated hydrodynamic escape with MUSCLES spectrum.
config_version = "3.0"

    [params.out]
        path = "auto"

    [params.dt]
        minimum  = 1e2
        maximum  = 8e7
        initial  = 1e2
        starspec = 1e10
        method   = "maximum"

        [params.stop.time]
            minimum = 8e8
            maximum = 1e9
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false
        [params.stop.escape]
            enabled = true
            p_stop  = 1.0

# Star: 0.1 M_sun M-dwarf with MUSCLES spectrum
[star]
    mass   = 0.1
    module = "mors"
    [star.mors]
        rot_pcntle      = 50.0
        age_now         = 4.567
        spectrum_source = "muscles"
        star_name       = "trappist-1"

# Orbit: close-in (0.05 AU)
[orbit]
    semimajoraxis = 0.05

# Planet: 0.9 Earth masses, volatile-rich
[planet]
    mass_tot        = 0.9
    prevent_warming = true
    volatile_mode   = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 200.0
        N_budget = 3.0

# Interior structure
[interior_struct]
    core_frac = 0.55

# Interior energetics: parameterized
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false

# Outgassing: reducing conditions
[outgas]
    fO2_shift_IW = -4
    module       = "calliope"

# Atmosphere: AGNI with real-gas EOS
[atmos_clim]
    module     = "agni"
    surf_state = "fixed"
    rayleigh   = false

    spectral_group = "Dayspring"
    spectral_bands = "16"
    p_top          = 1e-5

    [atmos_clim.agni]
        solve_energy  = false
        surf_material = "surface_albedos/Hammond24/lunarmarebasalt.dat"
        real_gas      = true
        solution_atol = 2.0
        solution_rtol = 0.13

    [atmos_clim.dummy]
        gamma = 0.99

# Escape: BOREAS fractionated hydrodynamic escape
[escape]
    module = "boreas"
    [escape.boreas]
        fractionate = true
        efficiency  = 0.5
