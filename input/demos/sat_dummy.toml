# Satellite demo (dummy tides): planet with a moon, parameterized tidal heating.
version = "3.0"

[params]
    [params.out]
        path      = "auto"
        write_mod = 400

    [params.dt]
        minimum = 1e2
        maximum = 3e7
        initial = 1e2

    [params.stop]
        [params.stop.time]
            maximum = 1e9
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false

# Star: fixed solar
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0

# Orbit: 1 AU with satellite
[orbit]
    module            = "dummy"
    eccentricity      = 0.0167
    axial_period      = 6            # [hours]
    satellite         = true
    mass_sat          = 7.347e22     # [kg] (lunar mass)
    semimajoraxis_sat = 32e6         # [m]
    [orbit.dummy]
        H_tide = 1e-7
        Imk2   = -0.01

# Planet
[planet]
    mass_tot = 1.0
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 200.0
        N_budget = 0.0

# Interior structure
[interior_struct]
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

# Interior energetics: parameterized with tidal heating
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false
    heat_tidal      = true

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_NH3 = false

# Atmosphere: grey opacity model
[atmos_clim]
    module     = "dummy"
    surf_state = "fixed"
    rayleigh   = false
    albedo_pl  = 0.1
    [atmos_clim.dummy]
        gamma = 0.8

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1.0e5

[accretion]
[observe]
[atmos_chem]
