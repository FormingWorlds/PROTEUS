# AGNI atmosphere demo: SOCRATES radiative transfer with dummy interior/escape.
version = "3.0"

[params]
    [params.out]
        path      = "auto"
        write_mod = 50

    [params.dt]
        initial = 1e3
        minimum = 1e3
        maximum = 3e7
        method  = "adaptive"
        atol    = 0.05
        rtol    = 0.13

    [params.stop]
        [params.stop.time]
            maximum = 1e9
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false
        [params.stop.escape]
            enabled = true
            p_stop  = 1.0        # [bar]

# Star: fixed solar luminosity
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0

# Orbit: 1 AU, weak tides
[orbit]
    module       = "dummy"
    eccentricity = 0.1
    [orbit.dummy]
        H_tide = 1e-9
        Imk2   = -0.01

# Planet
[planet]
    mass_tot = 1.0
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 3e3
        N_budget = 0.0

# Interior structure
[interior_struct]
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

# Interior energetics: parameterized
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_NH3 = false

# Atmosphere: AGNI with SOCRATES radiative transfer
[atmos_clim]
    module     = "agni"
    surf_state = "fixed"
    rayleigh   = false
    albedo_pl  = 0.2

    p_top          = 1.0e-5
    spectral_group = "Dayspring"
    spectral_bands = "16"

    [atmos_clim.agni]
        solve_energy = false
        surf_material = "greybody"

    [atmos_clim.dummy]
        gamma = 0.7

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1e7

[accretion]
[observe]
[atmos_chem]
