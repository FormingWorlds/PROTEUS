# Dummy demo: fast test run using parameterized modules (no external solvers).
# All modules set to "dummy" for rapid iteration and wiring tests.
version = "3.0"

[params]
    [params.out]
        path = "auto"

    [params.dt]
        initial  = 1e2           # initial step [yr]
        minimum  = 1e2           # min step [yr]
        maximum  = 3e7           # max step [yr]

    [params.stop]
        [params.stop.time]
            maximum = 1e9        # stop time [yr]
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false

# Star: fixed solar luminosity (no evolution)
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0                 # [R_sun]

# Orbit: 0.5 AU with weak tidal heating
[orbit]
    module        = "dummy"
    semimajoraxis = 0.5          # [AU]
    eccentricity  = 0.1
    [orbit.dummy]
        H_tide = 1e-9            # tidal power density [W/kg]
        Imk2   = -1e5            # Im(k2) love number

# Planet: 1 Earth mass, 3000 ppmw H
[planet]
    mass_tot      = 1.0              # [M_earth]
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 3e3
        N_budget = 0.0

# Interior structure
[interior_struct]
    core_frac      = 0.55        # radius fraction
    core_frac_mode = "radius"
    core_density   = 10738.33    # [kg/m3]
    core_heatcap   = 880.0       # [J/K/kg]

# Interior energetics: parameterized cooling
[interior_energetics]
    module = "dummy"

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_NH3 = false

# Atmosphere: grey opacity model
[atmos_clim]
    module     = "dummy"
    surf_state = "fixed"
    rayleigh   = false
    albedo_pl  = 0.1
    [atmos_clim.dummy]
        gamma = 0.7              # opacity factor (0 = transparent, 1 = opaque)

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1e6               # bulk escape rate [kg/s]

[accretion]
[observe]
[atmos_chem]
