# Aragog interior demo: scipy BDF thermal evolution with dummy atmosphere.
version = "3.0"

    [params.out]
        path      = "auto"
        plot_mod  = 1
        write_mod = 1

    [params.dt]
        initial     = 3e1
        minimum     = 1e1
        minimum_rel = 1e-4
        maximum     = 1e7
        starspec    = 1e9
        starinst    = 1e1

        [params.stop.solid]
            enabled = false

# Star: fixed solar luminosity
[star]
    module = "dummy"
    [star.dummy]
        radius = 1.0

# Orbit: 1 AU, no tides
[orbit]
    module = "none"

# Planet: 0.8 Earth masses
[planet]
    mass_tot      = 0.8
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "oceans"
        H_budget = 1.0

# Interior structure
[interior_struct]
    core_frac = 0.65

# Interior energetics: Aragog BDF solver
[interior_energetics]
    module          = "aragog"
    grain_size      = 0.1
    flux_guess      = 1e6
    heat_radiogenic = false
    rfront_loc      = 0.4
    rfront_wid      = 0.15

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_SO2 = false
        include_H2S = false
        include_NH3 = false
        include_H2  = false
        include_CH4 = false
        include_CO  = false

# Atmosphere: grey opacity model
[atmos_clim]
    module     = "dummy"
    surf_state = "fixed"
    rayleigh   = false

    p_top          = 1.0e-7
    spectral_group = "Honeyside"
    spectral_bands = "48"

    [atmos_clim.dummy]
        gamma = 0.01

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 2.0e4
