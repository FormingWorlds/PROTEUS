# JANUS atmosphere demo: convective pseudoadiabat with SOCRATES RT.
version = "3.0"

[params]
    [params.out]
        path      = "auto"
        write_mod = 400

    [params.dt]
        initial = 1e2
        minimum = 1e2
        maximum = 3e7

    [params.stop]
        [params.stop.time]
            maximum = 1e9
        [params.stop.solid]
            enabled = false
        [params.stop.radeqm]
            enabled = false

# Star: fixed solar luminosity
[star]
    module = "dummy"

# Orbit: 0.5 AU, weak tides
[orbit]
    module        = "dummy"
    semimajoraxis = 0.5
    eccentricity  = 0.1
    [orbit.dummy]
        H_tide = 1e-9
        Imk2   = -1e5

# Planet
[planet]
    volatile_mode = "elements"
    [planet.elements]
        H_mode   = "ppmw"
        H_budget = 3e3
        N_budget = 0.0

# Interior structure
[interior_struct]
    core_frac      = 0.55
    core_frac_mode = "radius"
    core_density   = 10738.33
    core_heatcap   = 880.0

# Interior energetics: parameterized
[interior_energetics]
    module          = "dummy"
    heat_radiogenic = false

# Outgassing
[outgas]
    fO2_shift_IW = 2
    module       = "calliope"
    [outgas.calliope]
        include_NH3 = false

# Atmosphere: JANUS convective pseudoadiabat
[atmos_clim]
    module     = "janus"
    surf_state = "fixed"
    rayleigh   = false
    albedo_pl  = 0.1

    p_top          = 1.0e-4
    p_obs          = 1e-3
    spectral_group = "Frostflow"
    spectral_bands = "16"
    overlap_method = "ro"

    [atmos_clim.janus]
        tropopause = "skin"

    [atmos_clim.dummy]
        gamma = 0.7

# Escape: fixed bulk rate
[escape]
    module = "dummy"
    [escape.dummy]
        rate = 1e6

[accretion]
[observe]
[atmos_chem]
