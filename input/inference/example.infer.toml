# Config file for inference scheme

# Set seed for reproducibility
seed = 42

# Logging level ("DEBUG", "INFO", "WARNING", "ERROR")
logging = "INFO"

# Path to output folder where inference will be saved (relative to PROTEUS output folder)
output = "bayesopt_infer_se_rbf_lei_5_100/"

# Path to base (reference) config file relative to PROTEUS root folder
ref_config = "output/bayesopt_se/init_coupler.toml"
# ref_config = "input/inference/example.toml"

# Method for initialising the inference scheme (one of these must be 'none')
init_samps = 3        # Number of random samples if starting from scratch.
init_grid  = 'none' # grid_demo/'   # Path pre-computed grid (relative to PROTEUS output folder)

# Excluded exit codes (in addition to edrrors)
failure_codes = [11, ] # solidified (10), escaped (15), max_runtime (11)

# Parameters for Bayesian optimisation
n_workers  = 5        # Number of parallel workers
kernel     = "RBF"    # Kernel type for GP, "RBF" | "MAT1/2" | "MAT3/2" | "MAT5/2"
acqf       = "LogEI"  # Acquisition function, "UCB" | "LogEI" | "LogPI"
n_steps    = 100       # Total number of evaluations (i.e. BO steps)

# Parameters to optimize (with bounds)
[parameters]
# "params.stop.time.maximum"  = [1e7,     3e9] # for SN only
# "orbit.semimajoraxis"       = [0.05,    0.2] # for SN only
# "interior_energetics.boundary.T_p_0"   = [2500.0,  4000.0]
# "planet.mass_tot"           = [1.0,     4.0]
"interior_struct.core_frac"           = [0.3,     0.7]
"outgas.fO2_shift_IW"       = [-4.0,    4.0]
"planet.elements.H_budget"= [1e3,     2e4]      # Hppmw
"planet.elements.C_budget"= [0.1,     4.0]        # C/H
"planet.elements.S_budget"= [0.1,     4.0]        # S/H


